<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Collection | Scorbunny's Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #d138ff;
            --bg-dark: #020205;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- PROFESSIONAL SPACE BACKGROUND --- */
        #spaceCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content-layer {
            position: relative;
            z-index: 10;
            padding: 40px 5%;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: white;
        }

        /* --- SEARCH & FILTERS --- */
        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .search-container {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
        }

        #searchInput {
            width: 100%;
            padding: 14px 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        #searchInput:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(209, 56, 255, 0.2);
        }

        .category-dropdown { position: relative; }

        .drop-btn {
            padding: 14px 25px;
            background: var(--neon-purple);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .drop-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(209, 56, 255, 0.4); }

        .dropdown-content {
            position: absolute;
            top: 120%; right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            min-width: 180px;
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            transition: 0.3s;
            z-index: 100;
        }

        .dropdown-content.active { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .dropdown-content div {
            padding: 15px 20px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        .dropdown-content div:hover { background: var(--neon-purple); }

        /* --- COLLECTION GRID --- */
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
            perspective: 1000px;
        }

        /* --- THE PROFESSIONAL CARD SLOT --- */
        .slot {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: var(--border) 0.3s;
            perspective: 1000px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.6s forwards;
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .card-container {
            position: relative;
            width: 100%;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            margin-bottom: 20px;
        }

        .slot img {
            width: 100%;
            border-radius: 12px;
            display: block;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Light Reflection Logic */
        .shine {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 12px;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.4) 0%, transparent 60%);
            mix-blend-mode: overlay;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card-container:hover .shine { opacity: 1; }

        .card-name {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .download-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid var(--neon-purple);
            color: white;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .download-btn:hover {
            background: var(--neon-purple);
            box-shadow: 0 0 20px rgba(209, 56, 255, 0.4);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 20px; text-align: center; }
            .controls { justify-content: center; }
            .search-container { max-width: 100%; }
        }
    </style>
</head>
<body>

<canvas id="spaceCanvas"></canvas>

<div class="content-layer">
    <header>
        <div class="title">FULL COLLECTION</div>
        <div class="category-dropdown">
            <button class="drop-btn" onclick="toggleDropdown()">Categories ▼</button>
            <div class="dropdown-content" id="dropdownMenu">
                <div onclick="filterCategory('All')">All Cards</div>
                <div onclick="filterCategory('Water')">Water</div>
                <div onclick="filterCategory('Fire')">Fire</div>
                <div onclick="filterCategory('Dark')">Dark</div>
                <div onclick="filterCategory('More')">More</div>
            </div>
        </div>
    </header>

    <div class="controls">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by card name..." onkeyup="searchCards()">
        </div>
    </div>

    <div class="collection-grid" id="collectionGrid">
        </div>
</div>

<script>
// --- 1. PRO STAR ENGINE ---
const canvas = document.getElementById('spaceCanvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function initStars() {
    for (let i = 0; i < 200; i++) {
        stars.push({
            x: Math.random() * canvas.width - canvas.width/2,
            y: Math.random() * canvas.height - canvas.height/2,
            z: Math.random() * canvas.width,
            o: Math.random()
        });
    }
}

function animate() {
    ctx.fillStyle = "#020205";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
        s.z -= 0.6;
        if (s.z <= 0) s.z = canvas.width;
        const x = (s.x / s.z) * canvas.width + canvas.width / 2;
        const y = (s.y / s.z) * canvas.width + canvas.height / 2;
        const size = (1 - s.z / canvas.width) * 2;
        ctx.fillStyle = `rgba(255,255,255,${s.o})`;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI*2);
        ctx.fill();
    });
    requestAnimationFrame(animate);
}
initStars(); animate();

// --- 2. CARD DATA & ENGINE ---
let cardFiles = [
    { name: "Dragonair", file: "Karta 1.jpg", category: "Water" },
    { name: "Litleo", file: "Karta 2.jpg", category: "Fire" },
    { name: "Nidoking", file: "Karta 3.jpg", category: "More" },
    { name: "Munna", file: "Karta 4.jpg", category: "Dark" },
    { name: "Lucario", file: "Karta 5.jpg", category: "More"},
    { name: "Infernape", file: "Karta 6.jpg", category: "Fire" },
    { name: "Tatsugiri", file: "Karta 7.jpg", category: "Water" },
    { name: "Mudsdale", file: "Karta 8.jpg", category: "More" },
    { name: "Noivern", file: "Karta 9.jpg", category: "Dark" },
    { name: "Wishiwashi", file: "Karta 10.jpg", category: "Water" },
    { name: "Koffing", file: "Karta 11.jpg", category: "Dark" },
    { name: "Lycanroc", file: "Karta 12.jpg", category: "More" },
    { name: "Charizard", file: "Karta 13.jpg", category: "Fire" },
    { name: "Umbreon", file: "Karta 14.jpg", category: "Dark" },
    { name: "Charizard", file: "Karta 15.jpg", category: "Fire" },
    { name: "Iono", file: "Karta 16.jpg", category: "More" },
    { name: "Gengar", file: "Karta 17.jpg", category: "Dark" },
    { name: "Blastoise", file: "Karta 18.jpg", category: "Water" },
    { name: "Entei", file: "Karta 19.jpg", category: "Fire" },
    { name: "Metagross", file: "Karta 20.jpg", category: "More" },
];

function loadCards(arr) {
    const grid = document.getElementById('collectionGrid');
    grid.innerHTML = "";
    arr.forEach((card, index) => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.style.animationDelay = `${index * 0.05}s`;
        
        slot.innerHTML = `
            <div class="card-container">
                <img src="${card.file}" alt="${card.name}">
                <div class="shine"></div>
            </div>
            <p class="card-name">${card.name}</p>
            <button class="download-btn" onclick="downloadCard('${card.file}')">Download</button>
        `;
        grid.appendChild(slot);
        setupCardEffect(slot.querySelector('.card-container'));
    });
}

// --- 3. THE PROFESSIONAL INTERACTION ENGINE ---
function setupCardEffect(card) {
    const shine = card.querySelector('.shine');
    card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        
        const rotX = (y - centerY) / 10;
        const rotY = (centerX - x) / 10;
        
        card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.05)`;
        shine.style.setProperty('--x', `${(x / rect.width) * 100}%`);
        shine.style.setProperty('--y', `${(y / rect.height) * 100}%`);
    });

    card.addEventListener('mouseleave', () => {
        card.style.transform = `rotateX(0) rotateY(0) scale(1)`;
        card.style.transition = "all 0.5s ease";
    });
    card.addEventListener('mouseenter', () => card.style.transition = "none" );
}

function downloadCard(src) {
    const a = document.createElement('a');
    a.href = src;
    a.download = src.split('/').pop();
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function toggleDropdown() { document.getElementById("dropdownMenu").classList.toggle("active"); }

function filterCategory(cat) {
    const filtered = cat === 'All' ? cardFiles : cardFiles.filter(c => c.category === cat);
    loadCards(filtered);
    toggleDropdown();
}

function searchCards() {
    const val = document.getElementById("searchInput").value.toLowerCase();
    const filtered = cardFiles.filter(c => c.name.toLowerCase().includes(val));
    loadCards(filtered);
}

// Initial Load
loadCards(cardFiles);

// Close dropdown on click outside
document.addEventListener("click", (e) => {
    if (!e.target.closest('.category-dropdown')) {
        document.getElementById("dropdownMenu").classList.remove("active");
    }
});
</script>
</body>
</html>
