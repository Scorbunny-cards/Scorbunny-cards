<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorbunny's Cards | Premium Art</title>
<style>
:root {
    --neon-purple: #c9a7eb;
    --bg-dark: #13132c;
    --text-main: #ffffff;
    --transition-prop: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    width: 100%;
    min-height: 100%; /* FIXED */
    background: url("bg1.png") center/cover no-repeat fixed;
    color: var(--text-main);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow-x: hidden;
    opacity: 0;
    transform: scale(1.02);
    animation: fadeInPage 1.2s forwards ease-out;
    transition: opacity 0.6s ease, transform 0.6s ease;
}

body.page-exit {
    opacity: 0;
    transform: scale(0.98);
}

@keyframes fadeInPage {
    to { opacity: 1; transform: scale(1); }
}

/* FIXED BACKGROUND OVERLAY */
body::before {
    content:"";
    position:fixed;
    inset:0; /* FIXED */
    background:linear-gradient(rgba(10,10,25,0.55), rgba(10,10,25,0.75));
    z-index:1;
    pointer-events:none;
}

/* --- THE SPACE ENGINE CANVAS --- */
#space {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    display: block;
    opacity: 0.85;
    transition: opacity 0.8s ease;
}

/* --- RESPONSIVE UI LAYER --- */
.ui-wrapper {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 40px 5%;
    pointer-events: none;
    animation: slideIn 1.2s ease-out forwards;
}

@keyframes slideIn {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.ui-wrapper * { pointer-events: auto; }

header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 40px;
}

.logo { width: 45px; height: auto; transition: transform 0.4s ease; }
.logo:hover { transform: rotate(10deg) scale(1.05); }

h1 {
    font-size: clamp(1rem, 4vw, 1.4rem);
    letter-spacing: 4px;
    font-weight: 900;
    text-transform: uppercase;
    text-shadow: 0 3px 10px rgba(0,0,0,0.8);
    color: #fff;
}

/* --- MAIN CONTENT GRID --- */
main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 60px;
    flex-grow: 1;
}

.hero-title {
    color: var(--neon-purple);
    font-size: clamp(2rem, 8vw, 3.8rem);
    line-height: 1.05;
    margin-bottom: 20px;
    font-weight: 800;
    text-transform: uppercase;
    text-shadow: 0 10px 30px rgba(0,0,0,0.8);
    opacity: 0;
    transform: translateY(20px);
    animation: heroFadeIn 1.2s forwards ease-out 0.5s;
}

@keyframes heroFadeIn {
    to { opacity: 1; transform: translateY(0); }
}

.hero-desc {
    font-size: clamp(1rem, 1.2vw, 1.2rem);
    margin-bottom: 20px;
    color: rgba(255,255,255,0.85);
    line-height: 1.5;
    opacity: 0;
    transform: translateY(10px);
    animation: heroFadeIn 1s forwards ease-out 0.7s;
}

/* --- BUTTONS --- */
.btn {
    display: inline-block;
    padding: 16px 45px;
    background: var(--neon-purple);
    color: white;
    text-decoration: none;
    font-weight: 800;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: var(--transition-prop);
    box-shadow: 0 12px 35px rgba(209, 56, 255, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
    margin-top: 25px;
    opacity: 0;
    transform: translateY(10px);
    animation: heroFadeIn 1s forwards ease-out 0.9s;
}

.btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 25px 50px rgba(209, 56, 255, 0.5);
    background: #df6cff;
}

/* --- CARD ZONE --- */
.card-zone {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.card-wrapper {
    perspective: 2000px;
    margin-bottom: 30px;
    width: 100%;
    max-width: 340px;
}

.card-container {
    position: relative;
    width: 100%;
    transform-style: preserve-3d;
    border-radius: 18px;
    transition: transform 0.15s ease-out;
}

.card-img {
    width:100%;
    border-radius:18px;
    box-shadow:0 25px 60px rgba(0,0,0,0.6);
    display:block;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.card-container:hover .card-img {
    transform: scale(1.02);
    box-shadow:0 35px 80px rgba(0,0,0,0.75);
}

/* RAY-TRACED REFLECTION */
.card-shine {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 18px;
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(circle at var(--shine-x, 50%) var(--shine-y, 50%), rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 55%);
    mix-blend-mode: overlay;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.card-container:hover .card-shine { opacity: 1; }

footer { margin-top: 40px; }
footer h2 { font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 900; }

/* --- RESPONSIVE BREAKPOINTS --- */
@media (max-width: 1024px) {
    main { grid-template-columns: 1fr; text-align: center; gap: 80px; }
    .hero-desc { margin: 0 auto 40px; }
    header { justify-content: center; }
    footer { text-align: center; }
}

@media (max-width: 480px) {
    .ui-wrapper { padding: 30px 20px; }
    .btn { width: 100%; padding: 15px 0; }
}

#shootingStars {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}
</style>
</head>
<body>

<canvas id="shootingStars"></canvas>
<canvas id="space"></canvas>

<div class="ui-wrapper">
<header>
    <img src="Logo.png" alt="Logo" class="logo">
    <h1>SCORBUNNYS CARDS</h1>
</header>

<main>
    <section class="text-side">
        <h2 class="hero-title">WE TURN POKEMON CARDS INTO ART!</h2>
        <p class="hero-desc">Making new card every day. Just go to my channel and comment any card that you want to be turned into art.</p>
        <a href="https://www.youtube.com/@scorbunnys-cards" target="_blank" class="btn">Youtube</a>
    </section>

    <section class="card-zone">
        <div class="card-wrapper" id="card-anchor">
            <div class="card-container" id="card-ui">
                <img src="Karta 13.jpg" alt="Art" class="card-img">
                <div class="card-shine" id="shine-layer"></div>
            </div>
        </div>
        <a href="collection.html" class="btn">Full collection</a>
    </section>
</main>

<footer>
    <h2>LETS MAKE THIS CARD INTO ART!</h2>
</footer>
</div>

<script>
document.querySelectorAll('a').forEach(link=>{
    link.addEventListener('click', e=>{
        if(link.target !== "_blank"){
            e.preventDefault();
            document.body.classList.add('page-exit');
            setTimeout(()=> window.location = link.href, 600);
        }
    });
});

// --- Original Space Engine & Shooting Stars Script Kept Intact ---
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');
let stars = [];
function init(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;stars=[];for(let i=0;i<250;i++){stars.push({x:Math.random()*canvas.width-canvas.width/2,y:Math.random()*canvas.height-canvas.height/2,z:Math.random()*canvas.width,o:Math.random()})}}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{s.z-=0.8;if(s.z<=0)s.z=canvas.width;const x=(s.x/s.z)*canvas.width+canvas.width/2;const y=(s.y/s.z)*canvas.width+canvas.height/2;const size=(1-s.z/canvas.width)*2.5;ctx.fillStyle=`rgba(255,255,255,${s.o})`;ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill()});requestAnimationFrame(draw)}
window.addEventListener('resize', init);
init(); draw();

const cardUI=document.getElementById('card-ui');
const anchor=document.getElementById('card-anchor');
const shine=document.getElementById('shine-layer');
const handleInteraction=e=>{const rect=anchor.getBoundingClientRect();const clientX=e.touches?e.touches[0].clientX:e.clientX;const clientY=e.touches?e.touches[0].clientY:e.clientY;const x=clientX-rect.left;const y=clientY-rect.top;if(x>0&&x<rect.width&&y>0&&y<rect.height){const centerX=rect.width/2;const centerY=rect.height/2;const rotX=(y-centerY)/12;const rotY=(centerX-x)/12;const shineX=(x/rect.width)*100;const shineY=(y/rect.height)*100;cardUI.style.transform=`rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.05)`;shine.style.setProperty('--shine-x',`${shineX}%`);shine.style.setProperty('--shine-y',`${shineY}%`)}};window.addEventListener('mousemove',handleInteraction);window.addEventListener('touchmove',handleInteraction);anchor.addEventListener('mouseleave',()=>{cardUI.style.transition="all 0.8s cubic-bezier(0.16, 1, 0.3, 1)";cardUI.style.transform=`rotateX(0deg) rotateY(0deg) scale(1)`});anchor.addEventListener('mouseenter',()=>{cardUI.style.transition="none"});

const starCanvas=document.getElementById("shootingStars");
const starCtx=starCanvas.getContext("2d");
starCanvas.width=window.innerWidth;
starCanvas.height=window.innerHeight;
let shootingStars=[];
function createStar(){shootingStars.push({x:Math.random()*starCanvas.width,y:Math.random()*starCanvas.height*0.5,length:Math.random()*80+50,speed:Math.random()*12+6,size:Math.random()*2})}
function drawStars(){starCtx.clearRect(0,0,starCanvas.width,starCanvas.height);shootingStars.forEach((star,i)=>{star.x+=star.speed;star.y+=star.speed*0.3;starCtx.beginPath();starCtx.moveTo(star.x,star.y);starCtx.lineTo(star.x-star.length,star.y-star.length*0.3);starCtx.strokeStyle="rgba(255,255,255,0.8)";starCtx.lineWidth=star.size;starCtx.stroke();if(star.x>starCanvas.width||star.y>starCanvas.height){shootingStars.splice(i,1)}});requestAnimationFrame(drawStars)}
setInterval(createStar,2000); drawStars();
window.addEventListener("resize",()=>{starCanvas.width=window.innerWidth;starCanvas.height=window.innerHeight});
</script>
</body>
</html>
